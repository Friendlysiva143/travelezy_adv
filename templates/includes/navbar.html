{% load static %}
<header>
    <div class="logo">
        <img src="{% static 'images/travel_logo.jpeg' %}" alt="Travel Logo"> <!-- Replace with your logo URL -->
    </div>
    <h1 class="title">TRVELEZY</h1>

    <nav>
        <div class="search-category">
            <div class="dropdown">
                <button class="dropbtn">Select Category</button>
                <div class="dropdown-content">
                    <a href="{% url 'trips' %}" class="dropdown-item">All places</a>
                    {% for category in links %}
                    <a href="{{ category.get_url }}" class="dropdown-item">{{category.catogery_name}}</a>
                    {% endfor %}
                </div>
            </div>
        </div>
        <a href="{% url 'trips' %}" class="btn btn-outline-primary float-right" style="color: black;">See all</a>
            <input type="text" id="search" name="search" placeholder="Search for destinations..." required>
            <button type="submit">Search</button>
        <a href="/">Home</a>
        {% if user.is_authenticated %}
        <a href="accounts/profile">Hello, {{ user.first_name }}</a>
        <a href="accounts/logout">Logout</a>
        {% else %}
        <a href="accounts/login">Login</a>
        <a href="accounts/register">Register</a>
        {% endif %}
    </nav>
</header>
